<!DOCTYPE html>
<html>
<head>
<title>SIM DICKY - INSTIPER GIS</title>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>
body { margin:0; font-family:Arial; }

#header{
  background:#0f172a;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

#map{ height:92vh; }
</style>
</head>

<body>

<div id="header">🌍 SIM DICKY - INSTIPER YOGYAKARTA GIS MAP</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>

// =====================
// CENTER INSTIPER (FIXED)
// =====================
const center = [-7.7612784, 110.4246399];

var map = L.map('map').setView(center, 18);

// =====================
// SATELIT MAP
// =====================
L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

// =====================
// HITUNG LUAS
// =====================
function luas(coords){
  let poly = turf.polygon([coords.map(p => [p[1], p[0]])]);
  return Math.round(turf.area(poly));
}

// =====================
// GEDUNG FUNCTION
// =====================
function gedung(nama,tipe,warna,coords){

  let layer = L.layerGroup().addTo(map);

  let poly = L.polygon(coords,{
    color:"#ffffff",
    weight:1,
    fillColor:warna,
    fillOpacity:0.5
  }).addTo(layer);

  let center = poly.getBounds().getCenter();

  L.circleMarker(center,{
    radius:3,
    color:"#000",
    fillColor:"#fff",
    fillOpacity:1
  }).addTo(layer);

  let l = luas(coords);

  poly.bindPopup(
    `<b>${nama}</b><br>`+
    `Tipe: ${tipe}<br>`+
    `Luas: ${l} m²<br>`+
    `INSTIPER Yogyakarta`
  );

}

// =====================
// GEDUNG INSTIPER (CLEAN STRUCTURE)
// =====================

// REKTORAT
gedung("Rektorat","#e74c3c","Administrasi",[
[-7.76132,110.42455],
[-7.76132,110.42478],
[-7.76112,110.42478],
[-7.76112,110.42455]
]);
